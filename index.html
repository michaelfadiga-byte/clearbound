*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#FAFAF8;--card:#FFFFFF;--muted:#F7F7F5;--hover:#F5F5F2;
  --border:#E8E6E1;--borderL:#F0EEEA;
  --text:#1A1A1A;--text2:#6B6B6B;--text3:#9B9B9B;
  --blue:#2563EB;--blueS:#EFF6FF;--blueB:#BFDBFE;
  --green:#16A34A;--greenS:#F0FDF4;--greenB:#BBF7D0;
  --amber:#D97706;--amberS:#FFFBEB;--amberB:#FDE68A;
  --red:#DC2626;--purple:#7C3AED;--purpleS:#F5F3FF;
  --font:'Satoshi',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  --shadow:0 1px 3px rgba(0,0,0,0.04),0 1px 2px rgba(0,0,0,0.02);
  --shadowMd:0 4px 16px rgba(0,0,0,0.06),0 1px 3px rgba(0,0,0,0.04);
}
html{scroll-behavior:smooth}
body{font-family:var(--font);background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased}

/* Nav */
nav{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(250,250,248,0.85);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:1px solid var(--border)}
.nav-inner{max-width:1120px;margin:0 auto;padding:14px 32px;display:flex;align-items:center;gap:12px}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none}
.logo-mark{width:28px;height:28px;border-radius:8px;background:var(--text);display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px;font-weight:800}
.logo-text{font-size:16px;font-weight:700;color:var(--text);letter-spacing:-0.02em}
.nav-links{display:flex;gap:28px;margin-left:auto;align-items:center}
.nav-links a{font-size:13px;color:var(--text2);text-decoration:none;font-weight:500;transition:color 0.15s}
.nav-links a:hover{color:var(--text)}
.nav-cta{padding:8px 18px;background:var(--text);color:#fff;border-radius:6px;font-size:13px;font-weight:600;text-decoration:none;transition:opacity 0.15s}
.nav-cta:hover{opacity:0.85}
